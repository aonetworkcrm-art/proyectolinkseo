<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧪 SUJETO: ROMNY REGALADO — Link SEO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050508;
  --grn:#00ff41;
  --cy:#00f0ff;
  --pu:#7c3aed;
  --pi:#ec4899;
  --text:#c8d6e5;
  --dim:#2d2d44;
}
@font-face{font-family:'Matrix';src:local('Courier New')}
body{
  font-family:'Courier New',monospace;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
  min-height:100vh;
}
#matrixCanvas{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  z-index:0;
  opacity:0.15;
  pointer-events:none;
}
.grid-overlay{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  z-index:1;
  pointer-events:none;
  background-image:
    linear-gradient(rgba(0,255,65,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,255,65,0.03) 1px,transparent 1px);
  background-size:40px 40px;
}
.scan-line{
  position:fixed;
  left:0;width:100%;height:2px;
  z-index:2;
  pointer-events:none;
  background:linear-gradient(90deg,transparent,var(--grn),transparent);
  animation:scanDown 4s linear infinite;
  opacity:0.4;
}
@keyframes scanDown{
  0%{top:-2px}
  100%{top:100%}
}
.container{
  position:relative;
  z-index:10;
  max-width:1200px;
  margin:0 auto;
  padding:20px;
}
.lab-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  border:1px solid rgba(0,255,65,0.15);
  background:rgba(0,255,65,0.03);
  margin-bottom:30px;
  flex-wrap:wrap;
  gap:10px;
}
.lab-badge{
  font-size:10px;
  color:var(--grn);
  text-transform:uppercase;
  letter-spacing:2px;
}
.lab-badge span{
  display:inline-block;
  width:8px;height:8px;
  border-radius:50%;
  background:var(--grn);
  margin-right:6px;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{opacity:1}
  50%{opacity:0.3}
}
.lab-id{
  font-size:11px;
  color:var(--dim);
  letter-spacing:1px;
}
.lab-id strong{color:var(--cy)}
.experiment{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
  padding:20px 0;
}
.subject-tag{
  text-align:center;
  padding:10px 30px;
  border:1px solid rgba(0,255,65,0.2);
  background:rgba(0,0,0,0.6);
  position:relative;
}
.subject-tag::before{
  content:'\25C6';
  color:var(--grn);
  position:absolute;
  left:-15px;
  top:50%;
  transform:translateY(-50%);
  font-size:10px;
}
.subject-tag::after{
  content:'\25C6';
  color:var(--grn);
  position:absolute;
  right:-15px;
  top:50%;
  transform:translateY(-50%);
  font-size:10px;
}
.subject-name{
  font-size:clamp(20px,3vw,36px);
  font-weight:700;
  letter-spacing:6px;
  background:linear-gradient(135deg,var(--grn),var(--cy));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.subject-alias{
  font-size:14px;
  color:var(--dim);
  letter-spacing:8px;
  text-transform:uppercase;
  margin-top:4px;
}
.subject-status{
  display:inline-flex;
  align-items:center;
  gap:6px;
  margin-top:8px;
  padding:3px 12px;
  border:1px solid rgba(0,255,65,0.2);
  font-size:10px;
  letter-spacing:2px;
  color:var(--grn);
}
.subject-status .dot{
  width:5px;height:5px;
  border-radius:50%;
  background:var(--grn);
  animation:pulse 1.5s ease-in-out infinite;
}
.hologram{
  position:relative;
  width:320px;
  height:480px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.silhouette-svg{
  width:100%;
  height:100%;
  filter:drop-shadow(0 0 15px rgba(0,255,65,0.2));
}
.silhouette-svg .body-path{
  fill:none;
  stroke:var(--grn);
  stroke-width:1.5;
  opacity:0.6;
}
.silhouette-svg .body-glow{
  fill:none;
  stroke:var(--grn);
  stroke-width:4;
  opacity:0.15;
  filter:blur(4px);
}
.silhouette-svg .node{
  fill:var(--grn);
  opacity:0.8;
  animation:nodePulse 2s ease-in-out infinite;
}
.silhouette-svg .node-label{
  font-size:7px;
  fill:var(--grn);
  opacity:0.7;
  font-family:'Courier New',monospace;
}
@keyframes nodePulse{
  0%,100%{r:3;opacity:0.8}
  50%{r:5;opacity:1}
}
.scanner-bar{
  position:absolute;
  left:0;
  width:100%;
  height:2px;
  background:linear-gradient(90deg,transparent,var(--grn),transparent);
  box-shadow:0 0 10px var(--grn),0 0 20px var(--grn);
  animation:scanBody 3s ease-in-out infinite;
  pointer-events:none;
}
@keyframes scanBody{
  0%{top:0;opacity:0.8}
  50%{top:100%;opacity:1}
  100%{top:0;opacity:0.8}
}
.data-nodes{
  position:absolute;
  width:100%;height:100%;
  top:0;left:0;
  pointer-events:none;
}
.data-node{
  position:absolute;
  font-size:8px;
  color:var(--grn);
  font-family:'Courier New',monospace;
  opacity:0;
  animation:fadeIn 0.5s ease forwards;
}
.data-node .label{
  color:var(--dim);
  font-size:7px;
  display:block;
  margin-bottom:2px;
}
.data-node .value{
  color:var(--cy);
  font-weight:700;
  font-size:9px;
}
@keyframes fadeIn{
  to{opacity:1}
}
.bio-panel{
  display:flex;
  gap:16px;
  flex-wrap:wrap;
  justify-content:center;
  margin-top:10px;
  width:100%;
  max-width:600px;
}
.bio-item{
  flex:1;
  min-width:120px;
  padding:10px 14px;
  border:1px solid rgba(0,255,65,0.1);
  background:rgba(0,0,0,0.4);
  text-align:center;
}
.bio-item .bio-label{
  font-size:8px;
  color:var(--dim);
  text-transform:uppercase;
  letter-spacing:2px;
  margin-bottom:4px;
}
.bio-item .bio-value{
  font-size:16px;
  font-weight:700;
  color:var(--cy);
  font-family:'Courier New',monospace;
}
.bio-item .bio-bar{
  height:2px;
  background:rgba(0,255,65,0.1);
  margin-top:6px;
  position:relative;
  overflow:hidden;
}
.bio-item .bio-bar-fill{
  height:100%;
  background:linear-gradient(90deg,var(--grn),var(--cy));
  width:0%;
  animation:barFill 2s ease-out forwards;
}
@keyframes barFill{
  to{width:var(--pct)}
}
.nav-grid{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
  margin-top:30px;
}
.nav-btn{
  padding:10px 24px;
  border:1px solid rgba(0,255,65,0.15);
  background:rgba(0,0,0,0.4);
  color:var(--text);
  text-decoration:none;
  font-size:11px;
  letter-spacing:1px;
  transition:all 0.3s ease;
  cursor:pointer;
  font-family:'Courier New',monospace;
}
.nav-btn:hover{
  border-color:var(--grn);
  background:rgba(0,255,65,0.05);
  color:var(--grn);
  transform:translateY(-2px);
  box-shadow:0 0 20px rgba(0,255,65,0.1);
}
.nav-btn.primary{
  border-color:var(--cy);
  color:var(--cy);
}
.nav-btn.primary:hover{
  background:rgba(0,240,255,0.05);
  box-shadow:0 0 20px rgba(0,240,255,0.15);
}
.lab-footer{
  margin-top:40px;
  padding:15px 20px;
  border-top:1px solid rgba(0,255,65,0.08);
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
  font-size:9px;
  color:var(--dim);
  letter-spacing:1px;
}
.lab-footer strong{color:var(--grn)}
.glitch{
  position:relative;
}
.glitch::before,.glitch::after{
  content:attr(data-text);
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  opacity:0;
}
.glitch::before{
  color:var(--cy);
  animation:glitch1 3s infinite;
}
.glitch::after{
  color:var(--pi);
  animation:glitch2 3s infinite;
}
@keyframes glitch1{
  0%,90%,100%{transform:translate(0);opacity:0}
  92%{transform:translate(-2px,1px);opacity:0.5}
  94%{transform:translate(2px,-1px);opacity:0.3}
  96%{transform:translate(-1px,2px);opacity:0.4}
}
@keyframes glitch2{
  0%,90%,100%{transform:translate(0);opacity:0}
  93%{transform:translate(2px,-1px);opacity:0.3}
  95%{transform:translate(-2px,1px);opacity:0.5}
  97%{transform:translate(1px,-2px);opacity:0.2}
}
@media(max-width:600px){
  .hologram{width:220px;height:340px}
  .bio-item{min-width:100px}
  .lab-header{flex-direction:column;text-align:center}
}
.terminal-text{
  font-size:10px;
  color:var(--dim);
  text-align:center;
  margin-bottom:8px;
  letter-spacing:1px;
}
.terminal-text .cursor{
  display:inline-block;
  width:8px;
  height:14px;
  background:var(--grn);
  animation:blink 1s step-end infinite;
  vertical-align:middle;
  margin-left:4px;
}
@keyframes blink{
  50%{opacity:0}
}
</style>
</head>

<div class="grid-overlay"></div>
<div class="scan-line"></div>
